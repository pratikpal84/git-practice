<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kana Practice</title>
<style>
body{margin:0;font-family:Arial;background:#fff;color:#333}
header{background:#ff7a00;color:white;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.container{max-width:900px;margin:20px auto;padding:20px;text-align:center}
.kana{font-size:95px;margin:25px 0;font-weight:bold}
input{padding:12px;font-size:18px;width:220px;border:2px solid #ff7a00;border-radius:8px;text-align:center;transition:.2s}
input.wrong{border-color:red;color:red}
.correct-answer{margin-top:10px;font-weight:bold;color:red;min-height:24px}
button{padding:10px 15px;margin:5px;border:none;border-radius:8px;cursor:pointer;font-size:14px;background:#ff7a00;color:white}
.toggle.active,.rowBtn.active{background:#888}
.stats{margin-top:15px;font-weight:bold}
.dark{background:#222;color:white}
.dark input{background:#333;color:white}
</style>
</head>
<body>
<header>Kana Practice</header>
<div class="container">

<div>
<button onclick="toggleScript()">Switch Script</button>
<button onclick="playSound()">🔊</button>
<button onclick="toggleDark()">🌙</button>
</div>

<br>

<div>
<button class="rowBtn" onclick="toggleRow('a',this)">A</button>
<button class="rowBtn" onclick="toggleRow('ka',this)">KA</button>
<button class="rowBtn" onclick="toggleRow('sa',this)">SA</button>
<button class="rowBtn" onclick="toggleRow('ta',this)">TA</button>
<button class="rowBtn" onclick="toggleRow('na',this)">NA</button>
<button class="rowBtn" onclick="toggleRow('ha',this)">HA</button>
<button class="rowBtn" onclick="toggleRow('ma',this)">MA</button>
<button class="rowBtn" onclick="toggleRow('ya',this)">YA</button>
<button class="rowBtn" onclick="toggleRow('ra',this)">RA</button>
<button class="rowBtn" onclick="toggleRow('wa',this)">WA</button>
<button class="rowBtn" onclick="toggleRow('n',this)">N</button>
</div>

<div class="kana" id="kana">あ</div>

<input type="text" id="answer" placeholder="Type romaji..." autocomplete="off">
<div class="correct-answer" id="correctAnswer"></div>

<div>
<button onclick="checkAnswer()">Submit</button>
</div>

<div class="stats">
Score: <span id="score">0</span> |
Streak: <span id="streak">0</span> 🔥 |
Accuracy: <span id="accuracy">0%</span>
</div>

</div>
  
<script>

const kanaData={
hiragana:{basic:{
a:{"あ":"a","い":"i","う":"u","え":"e","お":"o"},
ka:{"か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko"},
sa:{"さ":"sa","し":"shi","す":"su","せ":"se","そ":"so"},
ta:{"た":"ta","ち":"chi","つ":"tsu","て":"te","と":"to"},
na:{"な":"na","に":"ni","ぬ":"nu","ね":"ne","の":"no"},
ha:{"は":"ha","ひ":"hi","ふ":"fu","へ":"he","ほ":"ho"},
ma:{"ま":"ma","み":"mi","む":"mu","め":"me","も":"mo"},
ya:{"や":"ya","ゆ":"yu","よ":"yo"},
ra:{"ら":"ra","り":"ri","る":"ru","れ":"re","ろ":"ro"},
wa:{"わ":"wa","を":"wo"},
n:{"ん":"n"}
}},
katakana:{basic:{}}
};

function toKatakana(str){
return str.replace(/[\u3041-\u3096]/g,ch=>String.fromCharCode(ch.charCodeAt(0)+0x60));
}

for(let row in kanaData.hiragana.basic){
kanaData.katakana.basic[row]={};
for(let k in kanaData.hiragana.basic[row]){
kanaData.katakana.basic[row][toKatakana(k)]=kanaData.hiragana.basic[row][k];
}
}

let currentScript="hiragana";
let activeRows=[];
let currentSet={};
let kanaKeys=[];
let score=0,streak=0,total=0;
let currentKana="";

function buildSet(){
currentSet={};
if(activeRows.length===0){
for(let r in kanaData[currentScript].basic){
Object.assign(currentSet,kanaData[currentScript].basic[r]);
}
}else{
activeRows.forEach(r=>Object.assign(currentSet,kanaData[currentScript].basic[r]));
}
kanaKeys=Object.keys(currentSet);
}

function toggleRow(row,btn){
if(activeRows.includes(row)){
activeRows=activeRows.filter(r=>r!==row);
btn.classList.remove("active");
}else{
activeRows.push(row);
btn.classList.add("active");
}
buildSet();
nextKana();
}

function nextKana(){
let random=kanaKeys[Math.floor(Math.random()*kanaKeys.length)];
currentKana=random;
document.getElementById("kana").innerText=random;
document.getElementById("correctAnswer").innerText="";
document.getElementById("answer").classList.remove("wrong");
}

function checkAnswer(){
let input=document.getElementById("answer");
let user=input.value.trim().toLowerCase();
let correct=currentSet[currentKana];

total++; // ✅ count every attempt

if(user===correct){
score++;
streak++;
updateStats();
input.value="";
nextKana();
}else{
streak=0;
updateStats(); // ✅ update accuracy after wrong answer too
input.classList.add("wrong");
document.getElementById("correctAnswer").innerText="Correct: "+correct;
}
}

function updateStats(){
document.getElementById("score").innerText=score;
document.getElementById("streak").innerText=streak;
let acc=total?Math.round((score/total)*100):0;
document.getElementById("accuracy").innerText=acc+"%";
}

function toggleScript(){
currentScript=currentScript==="hiragana"?"katakana":"hiragana";
buildSet();nextKana();
}

function playSound(){
let u=new SpeechSynthesisUtterance(currentKana);
u.lang="ja-JP";speechSynthesis.speak(u);
}

function toggleDark(){document.body.classList.toggle("dark")}

document.getElementById("answer").addEventListener("keydown",e=>{
if(e.key==="Enter"){checkAnswer()}
});

buildSet();nextKana();

</script>
</body>
</html>
